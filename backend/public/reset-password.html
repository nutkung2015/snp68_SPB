<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งรหัสผ่านใหม่ — LivLink</title>
    <meta name="description" content="ตั้งรหัสผ่านใหม่สำหรับบัญชี LivLink ของคุณ">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
            /* อิงตามโทนสี Background ของ Landing Page (Deep Navy Blue) */
            background: radial-gradient(circle at top left, #2a3a5a 0%, #111827 80%, #0f1422 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Glassmorphism Card Style */
        .card {
            background: rgba(26, 35, 58, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            position: relative;
        }

        /* ตกแต่งแสงสะท้อนของ Card นิดหน่อยให้ดูพรีเมียม */
        /* .card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg);
            animation: shine 8s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        } */

        .card-header {
            padding: 40px 32px 24px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
            /* ระยะห่างตัวอักษรให้เหมือน Logo */
            margin-bottom: 8px;
            margin-right: -4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .text-white {
            color: #ffffff;
        }

        .text-blue {
            color: #5a8cef;
        }

        /* สีฟ้าของคำว่า LINK อิงจากเว็บ */

        .card-header p {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 400;
        }

        .card-body {
            padding: 32px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .form-group input::placeholder {
            color: #475569;
        }

        .form-group input:focus {
            border-color: #5a8cef;
            background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 0 0 4px rgba(90, 140, 239, 0.15), inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .form-group .hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }

        /* แต่งปุ่มให้เป็น Glassmorphism แบบเดียวกับแอป */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(180deg, rgba(74, 102, 148, 0.9) 0%, rgba(53, 75, 114, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(180deg, rgba(84, 116, 168, 0.95) 0%, rgba(61, 86, 131, 0.95) 100%);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Status Messages */
        .status-container {
            display: none;
            text-align: center;
            padding: 16px 32px 40px;
        }

        .status-header {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
        }

        .status-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .status-message {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.6;
        }

        .status-success .status-header {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .status-error .status-header {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        /* Alert */
        .alert {
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Password strength */
        .password-strength {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.3s ease, background 0.3s ease;
        }

        .strength-weak {
            width: 33%;
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }

        .strength-medium {
            width: 66%;
            background: #fbbf24;
            box-shadow: 0 0 8px #fbbf24;
        }

        .strength-strong {
            width: 100%;
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card-header">
            <h1 class="logo">
                <span class="text-white">LIV</span><span class="text-blue">LINK</span>
            </h1>
            <p>ระบบบริหารจัดการหมู่บ้านจัดสรรครบวงจร</p>
        </div>

        <!-- Form -->
        <div class="card-body" id="formContainer">
            <div style="text-align: center; margin-bottom: 24px;">
                <h2 style="font-size: 20px; font-weight: 600; color: #fff;">ตั้งรหัสผ่านใหม่</h2>
            </div>

            <div class="alert alert-error" id="errorAlert"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="newPassword">รหัสผ่านใหม่</label>
                    <input type="password" id="newPassword" placeholder="ความยาวอย่างน้อย 6 ตัวอักษร" required
                        minlength="6" oninput="checkStrength()">
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 32px;">
                    <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
                    <input type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง" required
                        minlength="6">
                </div>

                <button type="submit" class="btn" id="submitBtn">ยืนยัน</button>
            </form>
        </div>

        <!-- Success -->
        <div class="status-container status-success" id="successContainer">
            <div class="status-header">✓</div>
            <div class="status-title">เปลี่ยนรหัสผ่านสำเร็จ!</div>
            <p class="status-message">คุณสามารถเข้าสู่ระบบด้วยรหัสผ่านใหม่<br>ในแอปพลิเคชันได้แล้วทันที</p>
        </div>

        <!-- Error (expired/invalid) -->
        <div class="status-container status-error" id="errorContainer">
            <div class="status-header">✕</div>
            <div class="status-title">ลิงก์ไม่ถูกต้อง</div>
            <p class="status-message" id="errorMessage">
                ลิงก์รีเซ็ตรหัสผ่านไม่ถูกต้องหรือหมดอายุแล้ว<br>กรุณาติดต่อผู้ดูแลระบบเพื่อขอลิงก์ใหม่</p>
        </div>
    </div>

    <script>
        // อ่าน token จาก URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // ถ้าไม่มี token แสดง error ถาวร
        if (!token) {
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('errorContainer').style.display = 'block';
            document.getElementById('errorMessage').innerHTML = 'ไม่พบ token การเข้าถึงใน URL<br>กรุณากดผ่านลิงก์ที่ได้รับจากผู้ดูแลระบบ';
        }

        function checkStrength() {
            const password = document.getElementById('newPassword').value;
            const bar = document.getElementById('strengthBar');
            bar.className = 'password-strength-bar';

            if (password.length === 0) {
                bar.className = 'password-strength-bar';
            } else if (password.length < 6) {
                bar.classList.add('strength-weak');
            } else if (password.length < 10 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
                bar.classList.add('strength-medium');
            } else {
                bar.classList.add('strength-strong');
            }
        }

        // ดัก Event Submit ด้วย JavaScript แทน inline เพื่อป้องกัน Refresh หน้า 100%
        document.getElementById('resetForm').addEventListener('submit', handleSubmit);

        async function handleSubmit(e) {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorAlert = document.getElementById('errorAlert');
            const submitBtn = document.getElementById('submitBtn');

            // Reset error
            errorAlert.style.display = 'none';

            // Validate
            if (newPassword.length < 6) {
                errorAlert.textContent = 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';
                errorAlert.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                errorAlert.textContent = 'รหัสผ่านไม่ตรงกัน กรุณากรอกใหม่';
                errorAlert.style.display = 'block';
                return;
            }

            // Submit
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>กำลังบันทึกข้อมูล...';

            try {
                const baseUrl = window.location.origin;
                const response = await fetch(`${baseUrl}/api/auth/reset-password-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword }),
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    document.getElementById('formContainer').style.display = 'none';
                    document.getElementById('successContainer').style.display = 'block';
                } else {
                    if (data.message && (data.message.includes('หมดอายุ') || data.message.includes('ไม่ถูกต้อง') || data.message.includes('ถูกใช้'))) {
                        document.getElementById('formContainer').style.display = 'none';
                        document.getElementById('errorContainer').style.display = 'block';
                        document.getElementById('errorMessage').innerHTML = data.message;
                    } else {
                        errorAlert.textContent = data.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
                        errorAlert.style.display = 'block';
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'เริ่มต้นใช้งาน';
                    }
                }
            } catch (err) {
                errorAlert.textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่';
                errorAlert.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'เริ่มต้นใช้งาน';
            }
        }
    </script>
</body>

</html>
